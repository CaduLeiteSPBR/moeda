name = "coinhub-api"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "npm run build"

[[d1_databases]]
binding = "DB"
database_name = "coinhub-db"
database_id = "a6108396-92cd-457a-aa86-dbaf26473dd4"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "coinhub-images"

[vars]
FRONTEND_URL = "https://moedas.inovacx.com"
GOOGLE_REDIRECT_URI = "https://moedas.inovacx.com/auth/google/callback"
ADMIN_EMAIL = "caduleitenet@gmail.com"

[env.development]
[env.development.vars]
FRONTEND_URL = "http://localhost:5173"
GOOGLE_REDIRECT_URI = "http://localhost:5173/auth/google/callback"
ADMIN_EMAIL = "caduleitenet@gmail.com"

[[env.development.d1_databases]]
binding = "DB"
database_name = "coinhub-db"
database_id = "a6108396-92cd-457a-aa86-dbaf26473dd4"
migrations_dir = "migrations"

[[env.development.r2_buckets]]
binding = "R2"
bucket_name = "coinhub-images"
